  <style>
    :root {
      --bg: #f5f5f7;

      --preview-sans: "SF Pro Text", "SF Pro Display", "Inter", "Helvetica Neue", "Arial", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 8%, rgba(29, 29, 31, 0.04), transparent 24%),
        radial-gradient(circle at 90% 10%, rgba(60, 60, 67, 0.04), transparent 22%),
        linear-gradient(180deg, #fafafa 0%, #f5f5f7 46%, #f0f0f3 100%);
      font-family: var(--preview-serif);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:

        linear-gradient(90deg, rgba(60, 60, 67, 0.025) 1px, transparent 1px);

      opacity: 0.55;

    .page {
      position: relative;
      width: min(1440px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .shell {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      min-height: calc(100vh - 46px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;

      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #fff;
      background:
        linear-gradient(145deg, #1d1d1f, #3a3a3c);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 18px rgba(0, 0, 0, 0.10);
      overflow: hidden;
      font: 700 20px/1 var(--preview-sans);
    }

    .mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font: 500 12px/1.5 var(--preview-sans);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .editor-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .doc-stats {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      color: var(--muted);
      font: 500 12px/1 var(--preview-sans);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .doc-stats::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(60, 60, 67, 0.42);
    }

    .btn {
      border: 1px solid rgba(60, 60, 67, 0.10);
      background: rgba(255,255,255,0.82);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 15px;
      font: 600 13px/1 var(--preview-sans);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.04);
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(29, 29, 31, 0.18);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
    }

    .btn.primary {
      background: linear-gradient(145deg, #2c2c2e, #111111);
      color: #fff;
      border-color: transparent;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 0.92fr) minmax(420px, 1.08fr);
      gap: 18px;
      min-height: 0;
    }

    .panel {
      position: relative;
      min-height: 0;
      border: 1px solid rgba(60, 60, 67, 0.08);
      border-radius: var(--radius-lg);
      background: var(--panel);
      backdrop-filter: blur(20px);
      box-shadow: var(--paper-shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(60, 60, 67, 0.08);
      background: rgba(255,255,255,0.72);
      min-height: 86px;
    }

    .preview-head {
      min-height: 86px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.14em;
      font-family: var(--preview-sans);
      text-transform: uppercase;
    }

    .panel-head .hint {
      margin: 0;
      color: var(--muted);
      font: 500 12px/1.45 var(--preview-sans);
    }

    .mode-switch {
      display: inline-flex;
      gap: 6px;
      padding: 5px;
      border-radius: 999px;
      border: 1px solid rgba(60, 60, 67, 0.10);
      background: rgba(255,255,255,0.82);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }

    .mode-switch button {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 9px 13px;
      font: 600 12px/1 var(--preview-sans);
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .mode-switch button[aria-pressed="true"] {
      background: linear-gradient(145deg, #2c2c2e, #111111);
      color: #fff;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
    }

    .inline-btn {
      border: 1px solid rgba(60, 60, 67, 0.10);
      background: rgba(255,255,255,0.86);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font: 600 12px/1 var(--preview-sans);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.04);
      white-space: nowrap;
    }

    .inline-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(29, 29, 31, 0.18);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
    }

    .editor-wrap {
      position: relative;
      height: calc(100vh - 182px);
      min-height: 620px;
    }

    textarea {
      width: 100%;
      height: 100%;
      border: 0;
      outline: 0;
      resize: none;
      padding: 20px 22px 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.54)),
        rgba(255,255,255,0.22);
      color: #1d1d1f;
      font: 500 15px/1.8 var(--editor-font);
      letter-spacing: 0.01em;
      tab-size: 2;
      caret-color: var(--accent);
      overflow: auto;
    }

    textarea::selection {
      background: rgba(122, 78, 43, 0.18);
    }

    .preview {
      display: flex;
      align-items: stretch;
      height: calc(100vh - 182px);
      min-height: 620px;
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.54), rgba(248,248,250,0.96));
    }

    .preview-stage {
      width: 100%;
      min-height: 100%;
      padding: 30px 18px 34px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .paper {
      width: min(100%, 880px);
      margin: 0 auto;
      padding: 36px 38px 46px;
      color: #1d1d1f;
      font-family: var(--preview-serif);
      font-size: 14px;
      line-height: 2.0;
      letter-spacing: 0;
    }

    .preview[data-mode="mobile"] {

        linear-gradient(180deg, rgba(248,248,250,0.96), rgba(241,241,244,0.96));
    }

    .preview[data-mode="mobile"] .preview-stage {
      padding: 22px 16px 26px;
    }

    .preview[data-mode="mobile"] .paper {
      width: min(390px, 100%);
      padding: 24px 20px 30px;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
      font-size: 14px;
      line-height: 2.0;
      background: rgba(255,255,255,0.92);
    }

    .preview[data-mode="wechat"] {
      background:
        linear-gradient(180deg, rgba(248,248,250,0.96), rgba(242,242,245,0.96));
    }

    .preview[data-mode="wechat"] .preview-stage {
      padding: 22px 16px 26px;
    }

    .preview[data-mode="wechat"] .paper {
      width: min(375px, 100%);
      padding: 24px 20px 30px;
      border-radius: 24px;

      box-shadow: none;
      background: #ffffff;
      font-size: 14px;
      line-height: 2.0;
    }

    .paper > :first-child { margin-top: 0; }
    .paper > :last-child { margin-bottom: 0; }

    .paper h1,
    .paper h2,
    .paper h3,
    .paper h4 {
      margin: 1.2em 0 0.45em;
      line-height: 1.22;
      letter-spacing: 0.01em;
      font-family: var(--preview-serif);
      color: #1d1d1f;
    }

    .paper h1 {
      font-size: clamp(18px, 1.6vw, 22px);
      margin-top: 0;
      padding-bottom: 0.28em;
      border-bottom: 1px solid rgba(60, 60, 67, 0.10);
    }

    .paper h2 {
      font-size: clamp(15px, 1.3vw, 17px);
      position: relative;
      padding-left: 0;
      padding-bottom: 0.35em;
      border-bottom: 1px solid rgba(60, 60, 67, 0.10);
    }

    .paper h2::before {
      content: none;
    }

    .paper h3 { font-size: clamp(14px, 1.1vw, 16px); }
    .paper h4 { font-size: 12px; font-family: var(--preview-sans); letter-spacing: 0.03em; }

    .paper p {
      margin: 0 0 1em;
      color: #5e5e63;
      font-size: 1em;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .paper a {
      color: #111111;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.16em;
    }

    .paper strong {
      color: #1d1d1f;
      font-weight: 700;
    }

    .paper em {
      color: #5a5a5f;
    }

    .paper code {
      padding: 0.14em 0.36em;
      border-radius: 8px;
      background: var(--code-bg);
      border: 1px solid rgba(60, 60, 67, 0.08);
      font-family: var(--editor-font);
      font-size: 0.9em;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .paper pre {
      margin: 1.15em 0;
      padding: 18px 20px;
      overflow: auto;
      border-radius: 18px;
      background: #f5f5f7;
      color: #1d1d1f;
      border: 1px solid rgba(60, 60, 67, 0.08);
      box-shadow: none;
      font-size: 0.9em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .paper pre code {
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: 0.92em;
      line-height: 1.72;
    }

    .paper blockquote {
      margin: 1.2em 0;
      padding: 14px 18px;
      border-left: 4px solid rgba(29, 29, 31, 0.32);
      border-radius: 0 16px 16px 0;
      background: rgba(29, 29, 31, 0.04);
      color: #4a4a4d;
    }

    .paper ul,
    .paper ol {
      padding-left: 1.35em;
      margin: 0 0 1em;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .paper li {
      margin: 0.34em 0;
    }

    .paper hr {
      margin: 1.4em 0;
      border: 0;
      border-top: 1px solid rgba(60, 60, 67, 0.10);
    }

    .paper table {

      border-collapse: collapse;

      font-size: 0.96em;
      overflow: hidden;
      border-radius: 16px;
      table-layout: fixed;
    }

    .paper th,
    .paper td {
      padding: 11px 13px;
      border: 1px solid rgba(60, 60, 67, 0.08);

    .paper th {
      background: rgba(60, 60, 67, 0.04);
      font-family: var(--preview-sans);
      font-size: 0.88em;
      letter-spacing: 0.04em;

      word-break: break-word;

    .paper td {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .paper img {

      border-radius: 18px;

      margin: 1.1em auto;

    .paper .lead {

      color: #2f2f33;

    .meta-row {
      display: flex;

      gap: 10px;

    }

    .badge {

      height: 1px;

# 一页很舒服的 Markdown

## 为什么它要长得像一本书

好的编辑器，不只是把 Markdown 渲染出来，而是让内容本身更容易被阅读。
所以这里我把右侧预览做成了偏“纸张感”的版式：更宽的行距、更克制的颜色、清晰的标题层级，
让普通文档也能有很好的气质。

> 视觉不是装饰，而是帮助理解内容的结构。

## 适合写什么

- 文章草稿
- 产品说明
- 周报 / 月报
- 读书笔记
- 演示文稿初稿

## 代码示例

```js
function formatMarkdown(text) {
  return text.trim().replace(/\n{3,}/g, "\n\n");
}
```

## 表格示例

| 功能 | 说明 |
| --- | --- |
| 标题 | 自动建立层级感 |
| 引用 | 更像出版物里的注释 |
| 代码 | 使用深色代码块突出语义 |

## 收尾

如果你把一段原始文档贴进来，它会尽量保持内容本身，同时帮你把排版、字体和留白做得更稳重。

    const input = document.getElementById('markdownInput');
    const previewPanel = document.getElementById('preview');
    const preview = document.getElementById('previewContent');
    const sample = document.getElementById('tplSample').textContent.trim();
    const docStats = document.getElementById('docStats');
    const headingCount = document.getElementById('headingCount');
    const paragraphCount = document.getElementById('paragraphCount');
    const codeCount = document.getElementById('codeCount');
    const btnImport = document.getElementById('btnImport');
    const btnImage = document.getElementById('btnImage');
    const mdFileInput = document.getElementById('mdFileInput');
    const imageFileInput = document.getElementById('imageFileInput');
    const modeDesktop = document.getElementById('modeDesktop');
    const modeMobile = document.getElementById('modeMobile');
    const modeWeChat = document.getElementById('modeWeChat');
    const btnCopyWeChat = document.getElementById('btnCopyWeChat');
    let currentPreviewMode = 'desktop';

    const escapeHtml = (value) => value
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const slugify = (value) => value
      .toLowerCase()
      .trim()
      .replace(/[\s\W-]+/g, '-')
      .replace(/^-+|-+$/g, '');

    function renderInline(text) {
      let html = escapeHtml(text);
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => `<img alt="${escapeHtml(alt)}" src="${escapeHtml(src)}" />`);
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer noopener">$1</a>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/~~([^~]+)~~/g, '<del>$1</del>');
      return html;
    }

    function parseTable(lines, start) {
      if (!lines[start] || !lines[start + 1]) return null;
      const headerLine = lines[start].trim();
      const dividerLine = lines[start + 1].trim();
      if (!headerLine.includes('|') || !/^[:\-\s|]+$/.test(dividerLine)) return null;

      const splitRow = (line) => line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(cell => cell.trim());
      const headers = splitRow(headerLine);
      const rows = [];
      let index = start + 2;
      while (index < lines.length && lines[index].includes('|') && lines[index].trim() !== '') {
        rows.push(splitRow(lines[index]));
        index += 1;
      }

      const alignments = splitRow(dividerLine).map((cell) => {
        const left = cell.startsWith(':');
        const right = cell.endsWith(':');
        if (left && right) return 'center';
        if (right) return 'right';
        return 'left';
      });

      const thead = `<thead><tr>${headers.map((cell, index) => `<th style="text-align:${alignments[index] || 'left'}">${renderInline(cell)}</th>`).join('')}</tr></thead>`;
      const tbody = `<tbody>${rows.map((row) => `<tr>${headers.map((_, i) => `<td style="text-align:${alignments[i] || 'left'}">${renderInline(row[i] || '')}</td>`).join('')}</tr>`).join('')}</tbody>`;
      return { html: `<table>${thead}${tbody}</table>`, nextIndex: index - 1 };
    }

    function setPreviewMode(mode) {
      currentPreviewMode = mode;
      previewPanel.dataset.mode = mode;
      modeDesktop.setAttribute('aria-pressed', String(mode === 'desktop'));
      modeMobile.setAttribute('aria-pressed', String(mode === 'mobile'));
      modeWeChat.setAttribute('aria-pressed', String(mode === 'wechat'));
    }

    function applyWeChatStyles(html) {
      const wrapper = document.createElement('article');
      wrapper.style.cssText = [
        'margin:0',
        'padding:0',
        'color:#1d1d1f',
        'font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif',
        'font-size:14px',
        'line-height:2.0',
        'background:#fff'
      ].join(';');
      wrapper.innerHTML = html;

      const styleMap = {
        H1: 'margin:0 0 14px; padding-bottom:10px; border-bottom:1px solid rgba(60,60,67,0.08); font-size:20px; line-height:1.28; font-weight:700; color:#1d1d1f; letter-spacing:0.01em;',
        H2: 'margin:22px 0 10px; padding-bottom:8px; border-bottom:1px solid rgba(60,60,67,0.08); font-size:16px; line-height:1.38; font-weight:700; color:#1d1d1f; letter-spacing:0.01em;',
        H3: 'margin:18px 0 8px; font-size:14px; line-height:1.45; font-weight:700; color:#1d1d1f;',
        H4: 'margin:14px 0 6px; font-size:12px; line-height:1.45; font-weight:700; color:#1d1d1f;',
        P: 'margin:0 0 12px; font-size:14px; line-height:2.0; color:#5e5e63; overflow-wrap:anywhere; word-break:break-word;',
        BLOCKQUOTE: 'margin:16px 0; padding:12px 16px; border-left:4px solid #1d1d1f; background:#f6f6f7; color:#4a4a4d; border-radius:0 12px 12px 0;',
        UL: 'margin:0 0 14px; padding-left:18px;',
        OL: 'margin:0 0 14px; padding-left:18px;',
        LI: 'margin:6px 0; font-size:14px; line-height:2.0; color:#5e5e63; overflow-wrap:anywhere; word-break:break-word;',
        PRE: 'margin:16px 0; padding:14px 16px; border:1px solid rgba(60,60,67,0.08); border-radius:14px; background:#f5f5f7; overflow:auto; white-space:pre-wrap; word-break:break-word; color:#1d1d1f;',
        TABLE: 'width:100%; border-collapse:collapse; margin:16px 0; font-size:14px; table-layout:fixed;',
        TH: 'border:1px solid rgba(60,60,67,0.08); padding:10px 12px; background:#f5f5f7; text-align:left; vertical-align:top; overflow-wrap:anywhere; word-break:break-word;',
        TD: 'border:1px solid rgba(60,60,67,0.08); padding:10px 12px; text-align:left; vertical-align:top; overflow-wrap:anywhere; word-break:break-word;',
        IMG: 'display:block; max-width:100%; height:auto; margin:14px auto; border-radius:16px;',
        HR: 'border:0; border-top:1px solid rgba(60,60,67,0.10); margin:18px 0;',
        A: 'color:#111111; text-decoration:none;',
        STRONG: 'font-weight:700; color:#1d1d1f;',
        EM: 'font-style:italic; color:#5a5a5f;',
        DEL: 'color:#8c8c91;',
        CODE: 'font-family:Menlo,Monaco,Consolas,"Liberation Mono",monospace; font-size:14px;'
      };

      wrapper.querySelectorAll('*').forEach((el) => {
        const tag = el.tagName;
        if (styleMap[tag]) {
          el.style.cssText = styleMap[tag];
        }
        if (tag === 'CODE' && el.parentElement && el.parentElement.tagName === 'PRE') {
          el.style.cssText = 'font-family:Menlo,Monaco,Consolas,"Liberation Mono",monospace; font-size:14px; line-height:2.0; color:inherit; background:transparent; padding:0; margin:0; border:0;';
        }
      });

      wrapper.querySelectorAll('pre code').forEach((el) => {
        el.style.cssText = 'font-family:Menlo,Monaco,Consolas,"Liberation Mono",monospace; font-size:14px; line-height:2.0; color:inherit; background:transparent; padding:0; margin:0; border:0; white-space:pre-wrap; word-break:break-word;';
      });

      return wrapper.outerHTML;
    }

    function renderMarkdown(source) {
      const lines = source.replace(/\r\n/g, '\n').split('\n');
      let html = '';
      let i = 0;
      let inCode = false;
      let codeLang = '';
      let codeBuffer = [];
      let paragraphBuffer = [];
      let listType = null;
      let listBuffer = [];
      let stats = { headings: 0, paragraphs: 0, codes: 0 };

      const flushParagraph = () => {
        if (!paragraphBuffer.length) return;
        const text = paragraphBuffer.join(' ').trim();
        if (text) {
          const isLead = html === '';
          html += `<p${isLead ? ' class="lead"' : ''}>${renderInline(text)}</p>`;
          stats.paragraphs += 1;
        }
        paragraphBuffer = [];
      };

      const flushList = () => {
        if (!listBuffer.length) return;
        html += `<${listType}>${listBuffer.map(item => `<li>${renderInline(item)}</li>`).join('')}</${listType}>`;
        listBuffer = [];
        listType = null;
      };

      const flushCode = () => {
        if (!codeBuffer.length) return;
        html += `<pre><code${codeLang ? ` class="language-${escapeHtml(codeLang)}"` : ''}>${escapeHtml(codeBuffer.join('\n'))}</code></pre>`;
        stats.codes += 1;
        codeBuffer = [];
        codeLang = '';
      };

      while (i < lines.length) {
        const line = lines[i];
        const trimmed = line.trim();

        if (trimmed.startsWith('```')) {
          if (!inCode) {
            flushParagraph();
            flushList();
            inCode = true;
            codeLang = trimmed.slice(3).trim();
          } else {
            inCode = false;
            flushCode();
          }
          i += 1;
          continue;
        }

        if (inCode) {
          codeBuffer.push(line);
          i += 1;
          continue;
        }

        if (!trimmed) {
          flushParagraph();
          flushList();
          i += 1;
          continue;
        }

        const table = parseTable(lines, i);
        if (table) {
          flushParagraph();
          flushList();
          html += table.html;
          i = table.nextIndex + 1;
          continue;
        }

        const headingMatch = /^(#{1,6})\s+(.*)$/.exec(trimmed);
        if (headingMatch) {
          flushParagraph();
          flushList();
          const level = headingMatch[1].length;
          const id = slugify(headingMatch[2]);
          html += `<h${level} id="${id}">${renderInline(headingMatch[2])}</h${level}>`;
          stats.headings += 1;
          i += 1;
          continue;
        }

        if (/^>\s?/.test(trimmed)) {
          flushParagraph();
          flushList();
          const quoteLines = [];
          while (i < lines.length && /^>\s?/.test(lines[i].trim())) {
            quoteLines.push(lines[i].trim().replace(/^>\s?/, ''));
            i += 1;
          }
          html += `<blockquote>${quoteLines.map((part) => renderInline(part)).join('<br>')}</blockquote>`;
          continue;
        }

        if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) {
          flushParagraph();
          flushList();
          html += '<hr />';
          i += 1;
          continue;
        }

        const orderedMatch = /^(\d+)\.\s+(.*)$/.exec(trimmed);
        const unorderedMatch = /^[-*+]\s+(.*)$/.exec(trimmed);
        if (orderedMatch || unorderedMatch) {
          flushParagraph();
          const nextType = orderedMatch ? 'ol' : 'ul';
          if (listType && listType !== nextType) flushList();
          listType = nextType;
          listBuffer.push((orderedMatch || unorderedMatch)[2] || (unorderedMatch && unorderedMatch[1]) || '');
          i += 1;
          while (i < lines.length) {
            const nextTrimmed = lines[i].trim();
            const nextOrdered = /^(\d+)\.\s+(.*)$/.exec(nextTrimmed);
            const nextUnordered = /^[-*+]\s+(.*)$/.exec(nextTrimmed);
            if ((nextType === 'ol' && nextOrdered) || (nextType === 'ul' && nextUnordered)) {
              listBuffer.push((nextOrdered || nextUnordered)[2] || (nextOrdered || nextUnordered)[1] || '');
              i += 1;
            } else {
              break;
            }
          }
          continue;
        }

        paragraphBuffer.push(trimmed);
        i += 1;
      }

      flushParagraph();
      flushList();
      if (inCode) flushCode();

      if (!html.trim()) {
        html = `
          <div class="empty">
            <div>
              <strong>在左侧输入 Markdown</strong>
              <div>例如标题、引用、列表或代码块。右侧会自动排成一页更有质感的文章。</div>
            </div>
          </div>
        `;
      }

      return { html, stats };
    }

    function updatePreview() {
      const value = input.value.trim();
      const source = value || sample;
      const { html, stats } = renderMarkdown(source);
      preview.innerHTML = html;
      previewPanel.dataset.mode = currentPreviewMode;

      const chars = (value || sample).replace(/\s/g, '').length;
      const lines = (value || sample).split('\n').length;
      docStats.textContent = `${chars} 字 · ${lines} 行`;
      headingCount.textContent = `${stats.headings}`;
      paragraphCount.textContent = `${stats.paragraphs}`;
      codeCount.textContent = `${stats.codes}`;
    }

    async function copyRichHtmlToClipboard(html, plainText) {
      if (navigator.clipboard && window.ClipboardItem) {
        try {
          const item = new ClipboardItem({
            'text/html': new Blob([html], { type: 'text/html' }),
            'text/plain': new Blob([plainText], { type: 'text/plain' })
          });
          await navigator.clipboard.write([item]);
          return true;
        } catch (error) {
          // Fall through to the legacy copy path.
        }
      }

      const helper = document.createElement('div');
      helper.contentEditable = 'true';
      helper.style.cssText = 'position:fixed;left:-9999px;top:0;width:1px;height:1px;overflow:hidden;opacity:0;';
      helper.innerHTML = html;
      document.body.appendChild(helper);

      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(helper);
      selection.removeAllRanges();
      selection.addRange(range);

      let copied = false;
      try {
        copied = document.execCommand('copy');
      } catch (error) {
        copied = false;
      }

      selection.removeAllRanges();
      helper.remove();
      return copied;
    }

    function buildExportStyles() {
      return `
:root {
  --text: #1d1d1f;
  --muted: #5e5e63;
  --line: rgba(60, 60, 67, 0.08);
  --bg: #f5f5f7;
  --paper: #ffffff;
}
body {
  margin: 0;
  padding: 40px 16px;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
}
.export-page {
  width: min(100%, 860px);
  margin: 0 auto;
  background: var(--paper);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 10px 28px rgba(0, 0, 0, 0.05);
  font-size: 14px;
  line-height: 2;
}
.export-page h1,
.export-page h2,
.export-page h3,
.export-page h4 {
  line-height: 1.22;
  color: var(--text);
}
.export-page p {
  color: var(--muted);
  line-height: 2;
  margin: 0 0 12px;
}
.export-page h1 {
  margin: 0 0 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
  font-size: 20px;
  letter-spacing: 0.01em;
}
.export-page h2 {
  margin: 22px 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
  font-size: 16px;
  letter-spacing: 0.01em;
}
.export-page h3 {
  margin: 18px 0 8px;
  font-size: 14px;
}
.export-page h4 {
  margin: 14px 0 6px;
  font-size: 12px;
}
.export-page blockquote {
  margin: 16px 0;
  padding: 12px 16px;
  border-left: 4px solid var(--text);
  background: #f6f6f7;
  color: #4a4a4d;
  border-radius: 0 12px 12px 0;
}
.export-page ul,
.export-page ol {
  margin: 0 0 14px;
  padding-left: 18px;
}
.export-page li {
  margin: 6px 0;
  color: var(--muted);
}
.export-page pre {
  margin: 16px 0;
  padding: 16px 18px;
  border-radius: 16px;
  overflow: auto;
  background: #f5f5f7;
  color: var(--text);
  border: 1px solid var(--line);
  line-height: 1.8;
}
.export-page code {
  font-family: "SFMono-Regular","Cascadia Code",Menlo,Consolas,monospace;
  font-size: 14px;
}
.export-page table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  margin: 16px 0;
}
.export-page th,
.export-page td {
  border: 1px solid var(--line);
  padding: 10px 12px;
}
.export-page img {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 14px auto;
  border-radius: 16px;
}
.export-page hr {
  border: 0;
  border-top: 1px solid rgba(60, 60, 67, 0.10);
  margin: 18px 0;
}
.export-page a {
  color: #111111;
  text-decoration: none;
}
      `.trim();
    }

    function buildExportDocument(bodyHtml) {
      return `<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>导出的 Markdown 预览</title>
<style>
${buildExportStyles()}
</style>
</head>
<body><article class="export-page">${bodyHtml}</article></body>
</html>`;
    }

    function copyMarkdown() {
      const text = input.value || sample;
      const done = () => {
        const btn = document.getElementById('btnCopy');
        const prev = btn.textContent;
        btn.textContent = '已复制';
        setTimeout(() => {
          btn.textContent = prev;
        }, 1200);
      };

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(() => {
          input.focus();
          input.select();
          document.execCommand('copy');
          done();
        });
        return;
      }

      input.focus();
      input.select();
      document.execCommand('copy');
      done();
    }

    function importMarkdownFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        input.value = String(reader.result || '');
        updatePreview();
        setPreviewMode('desktop');
      };
      reader.readAsText(file);
    }

    function insertImageAtCursor(markdownImageSyntax) {
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      const value = input.value;
      const before = value.slice(0, start);
      const after = value.slice(end);
      const needsSpaceBefore = before && !/\n$/.test(before) && !/\s$/.test(before);
      const needsSpaceAfter = after && !/^\n/.test(after) && !/^\s/.test(after);
      const snippet = `${needsSpaceBefore ? '\n' : ''}${markdownImageSyntax}${needsSpaceAfter ? '\n' : ''}`;
      input.value = `${before}${snippet}${after}`;
      const caret = before.length + snippet.length;
      input.setSelectionRange(caret, caret);
      input.focus();
      updatePreview();
    }

    function openImagePicker() {
      imageFileInput.click();
    }

    function openMdPicker() {
      mdFileInput.click();
    }

    imageFileInput.addEventListener('change', async () => {
      const file = imageFileInput.files && imageFileInput.files[0];
      if (!file) return;
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
      const alt = file.name.replace(/\.[^.]+$/, '');
      insertImageAtCursor(`![${alt}](${dataUrl})`);
      imageFileInput.value = '';
    });

    mdFileInput.addEventListener('change', () => {
      const file = mdFileInput.files && mdFileInput.files[0];
      if (!file) return;
      importMarkdownFile(file);
      mdFileInput.value = '';
    });

    async function copyToWeChat() {
      const source = input.value.trim() || sample;
      const { html } = renderMarkdown(source);
      const wechatHtml = applyWeChatStyles(html);
      const copied = await copyRichHtmlToClipboard(wechatHtml, source);
      if (copied) {
        setPreviewMode('wechat');
      }
      const btn = btnCopyWeChat;
      const prev = btn.textContent;
      btn.textContent = copied ? '已复制公众号格式' : '复制失败';
      setTimeout(() => {
        btn.textContent = prev;
      }, 1400);
    }

    function exportHtml() {
      const payload = renderMarkdown(input.value || sample).html;
      const wrapped = buildExportDocument(payload);
      const blob = new Blob([wrapped], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'markdown-preview.html';
      a.click();
      URL.revokeObjectURL(url);
    }

    btnImport.addEventListener('click', openMdPicker);
    btnImage.addEventListener('click', openImagePicker);

    document.getElementById('btnClear').addEventListener('click', () => {
      input.value = '';
      updatePreview();
      input.focus();
    });

    document.getElementById('btnCopy').addEventListener('click', copyMarkdown);
    btnCopyWeChat.addEventListener('click', copyToWeChat);
    document.getElementById('btnExport').addEventListener('click', exportHtml);
    input.addEventListener('input', updatePreview);
    modeDesktop.addEventListener('click', () => {
      setPreviewMode('desktop');
      updatePreview();
    });
    modeMobile.addEventListener('click', () => {
      setPreviewMode('mobile');
      updatePreview();
    });
    modeWeChat.addEventListener('click', () => {
      setPreviewMode('wechat');
      updatePreview();
    });

    setPreviewMode('desktop');
    input.value = sample;
    updatePreview();
  </script>
</body>
</html>
